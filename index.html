<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valley Liquor Stock</title>
    <link rel="stylesheet" href="./Resources/style.css">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
</head>
<body>

<div id="menuOverlay" onclick="toggleRotation()"></div>

<div id="sideMenu" class="side-nav">
    <a href="#beers-section" class="menu-link" onclick="toggleRotation()">beers</a>
    <a href="#wines-section" class="menu-link" onclick="toggleRotation()">wines</a>
    <a href="#spirits-section" class="menu-link" onclick="toggleRotation()">spirits</a>
    <div style="margin-top: 20px; padding: 0 25px;">
        <button class="btn btn-outline-light btn-block" onclick="showAddProductModal(); toggleRotation();">Add Product</button>
    </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top py-3" style="background-color: #5E1224 !important;">
    <div class="d-flex align-items-center">
        <img src="./Resources/navBtn.png" id="navBtnImg" alt="nav-btn" width="30" height="30" class="mr-4 nav-icon" onclick="toggleRotation()">
        <a class="navbar-brand" href="#" style="font-weight: bold;">Valley Liquor Store</a>
    </div>

    <form class="form-inline ml-auto" onsubmit="event.preventDefault(); searchProducts();">
        <div class="input-group search-container">
            <input class="form-control form-control-sm rounded-pill border-0 px-3" 
                   type="search" 
                   id="searchInput" 
                   placeholder="Search products..." 
                   style="width: 220px; background-color: #ddd; color: #333; height: 32px;">
            
            <button class="btn btn-sm" type="button" onclick="searchProducts()" 
                    style="position: absolute; right: 10px; z-index: 10; background: transparent; border: none; color: #888;">
                🔍
            </button>
        </div>
    </form>
</nav>

<div id="beers-section" class="title-bar">beers</div>
<div class="section">
    <div id="beers-products" class="products"></div> </div>

<div id="wines-section" class="title-bar">wines</div>
<div class="section">
    <div id="wines-products" class="products"></div>
</div>

<div id="spirits-section" class="title-bar">spirits</div>
<div class="section">
    <div id="spirits-products" class="products"></div>
</div>
<!-- 
<button class="floating-btn" onclick="showAddProductModal()">+</button> -->

<div class="modal fade" id="addProductModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Add Product</h5></div>
      <div class="modal-body">
        <form id="addProductForm">
            <div class="form-group mb-3">
                <label for="productImage" class="font-weight-bold" style="font-size: 0.9rem;">Product Image</label>
                <input type="file" class="form-control" id="productImage" accept="image/*">
                <small class="text-muted">Max 64MB (defaults to generic image if empty or too large)</small>
            </div>
        
            <div class="form-group mb-3">
                <label for="productType" class="font-weight-bold" style="font-size: 0.9rem;">Company / Brand</label>
                <input type="text" class="form-control" id="productType" placeholder="e.g. Labatt, Smirnoff" required>
            </div>
        
            <div class="form-group mb-3">
                <label for="productName" class="font-weight-bold" style="font-size: 0.9rem;">Product Name</label>
                <input type="text" class="form-control" id="productName" placeholder="e.g. Blue, Ice Berry Blast" required>
            </div>
        
            <div class="form-group mb-3">
                <label for="productSection" class="font-weight-bold" style="font-size: 0.9rem;">Store Section</label>
                <select class="form-control" id="productSection" required>
                    <option value="beers-section">Beers</option>
                    <option value="wines-section">Wines</option>
                    <option value="spirits-section">Spirits</option>
                </select>
            </div>
        
            <div class="form-group mb-3">
                <label for="productQuantity" class="font-weight-bold" style="font-size: 0.9rem;">Stock Quantity</label>
                <input type="number" class="form-control" id="productQuantity" placeholder="Quantity" value="0">
            </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" onclick="saveProduct()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="./Resources/script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
