<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valley Liquor Stock</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    
    <style>
        .title-bar { text-align: center; margin-top: 20px; margin-bottom: 20px; font-size: 2em; font-weight: bold; padding: 10px; background-color: #f8f9fa; border-radius: 5px; }
        .section { display: flex; justify-content: center; align-items: center; margin-top: 20px; }
        .products { width: 100%; max-width: 1200px; }
        .product-item { position: relative; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 10px; border: 1px solid #ddd; border-radius: 5px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); background-color: #fff; height: 350px; width: 200px;}
        .product-item img { border-radius: 5px; height: 150px; object-fit: contain; max-width: 150px; max-height: 150px;}
        .delete-btn { position: absolute; top: 5px; right: 5px; background: transparent; border: none; font-size: 1.5rem; color: #aaa; cursor: pointer; }
        .delete-btn:hover { color: #ff0000; }
        body { padding-top: 70px; background-color: #f1f1f1; }
        .floating-btn { position: fixed; bottom: 20px; right: 20px; background-color: #5E1224; color: white; border: none; border-radius: 50%; width: 60px; height: 60px; font-size: 24px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); cursor: pointer; z-index: 1000;}
        .nav-icon {
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .rotate-90 {
            transform: rotate(90deg);
        }
        .side-nav {
            height: 100%;
            width: 180px;
            position: fixed;
            z-index: 1030; /* Above navbar content but below modal */
            top: 0;
            left: -250px; /* Start hidden off-screen */
            background-color: #5E1224;
            transition: 0.3s ease;
            padding-top: 90px; /* Space for the navbar */
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
        }
    
        /* Active State */
        .side-nav.active {
            left: 0;
        }
    
        /* Menu Links */
        .menu-link {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 1.2rem;
            color: white;
            display: block;
            transition: 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
    
        .menu-link:hover {
            background-color: #7a1a31;
            color: #ffd700;
            text-decoration: none;
        }
    
        /* Dimmed Overlay */
        #menuOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1025;
            display: none;
        }
    </style>
</head>
<body>

<div id="menuOverlay" onclick="toggleRotation()"></div>

<div id="sideMenu" class="side-nav">
    <a href="#beers-section" class="menu-link" onclick="toggleRotation()">beers</a>
    <a href="#wines-section" class="menu-link" onclick="toggleRotation()">wines</a>
    <a href="#spirits-section" class="menu-link" onclick="toggleRotation()">spirits</a>
    <div style="margin-top: 20px; padding: 0 25px;">
        <button class="btn btn-outline-light btn-block" onclick="showAddProductModal(); toggleRotation();">Add Product</button>
    </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top py-3" style="background-color: #5E1224 !important;">
    <img src="./Resources/navBtn.png" id="navBtnImg"alt="nav-btn" width="30" height="30" class="mr-4 nav-icon" onclick="toggleRotation()">
         <a class="navbar-brand" href="#" style="font-weight: bold;">Valley Liquor Store</a>
</nav>

<div id="beers-section" class="title-bar">beers</div>
<div class="section">
    <div id="beers-products" class="products"></div> </div>

<div id="wines-section" class="title-bar">wines</div>
<div class="section">
    <div id="wines-products" class="products"></div>
</div>

<div id="spirits-section" class="title-bar">spirits</div>
<div class="section">
    <div id="spirits-products" class="products"></div>
</div>
<!-- 
<button class="floating-btn" onclick="showAddProductModal()">+</button> -->

<div class="modal fade" id="addProductModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Add Product</h5></div>
      <div class="modal-body">
        <form id="addProductForm">
          <input type="file" class="form-control mb-2" id="productImage" accept="image/*">
          <input type="text" class="form-control mb-2" id="productType" placeholder="Company (e.g. Labatte)" required>
          <input type="text" class="form-control mb-2" id="productName" placeholder="Product Name" required>
          <select class="form-control mb-2" id="productSection" required>
              <option value="beers-section">beers</option>
              <option value="wines-section">wines</option>
              <option value="spirits-section">spirits</option>
          </select>
          <input type="number" class="form-control mb-2" id="productQuantity" placeholder="Quantity" value="0">
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" onclick="saveProduct()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="./Resources/script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
